<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBTI 人格测试</title>
  <meta name="description" content="MBTI已经过时，SBTI来了。一个开源的娱乐性人格测试。" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <p class="intro-kicker">我敲咖啡人格测试</p>
        <h1 class="intro-title">MBTI已经过时，<br/>SBTI来了。</h1>
        <p class="intro-subtitle">做完测试，也顺手看看你更适合喝哪一杯。</p>
        <button id="btn-start" class="btn btn-primary">开始测试</button>
        <p class="intro-credit">我敲咖啡出品 · 基于原测试改编</p>
        <p class="intro-note">本测试仅供娱乐</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 31</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker" id="result-kicker">你的主类型</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="coffee-section">
          <p class="coffee-lead">你的测试结果出来了，也顺手看看你更适合喝哪一杯。</p>
          <div class="coffee-label">适合你的咖啡</div>
          <div class="coffee-name" id="coffee-name"></div>
          <div class="coffee-reason" id="coffee-reason"></div>
        </div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">十五维度评分</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>

        <div class="contact-section">
          <img class="contact-qr" src="/ciaocoffee-wechat-qr.jpg" alt="CiaoCoffee我敲微信二维码" />
          <p class="contact-copy">我敲咖啡，欢迎扫码来找我。把你的测试结果发我，我帮你从菜单里挑一杯适合你的。</p>
          <p class="contact-account">微信扫码添加 CiaoCoffee我敲</p>
          <p class="contact-hint">电脑端可直接扫码，手机端可截图后在微信识别</p>
        </div>
      </div>
    </section>
  </div>

  <!-- CiaoCoffee landing page -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
